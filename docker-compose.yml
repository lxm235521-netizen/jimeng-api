services:
  jimeng-api:
    # 使用本仓库代码构建镜像（服务器无需安装 npm）
    image: my-jimeng-api:latest
    container_name: jimeng-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5100:5100"
    volumes:
      # 数据持久化（Token 池）
      - ./data:/app/data
      # 日志目录
      - ./logs:/app/logs
      # 临时目录
      - ./tmp:/app/tmp
      # 配置覆盖（可选）
      - ./configs:/app/configs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5100/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"